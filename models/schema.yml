models:
  - name: dim_listings_cleansed
    columns:
     - name: price
       data_tests:
        - positive_values
     - name: listing_id
       data_tests:
         - unique
         - not_null

     - name: host_id
       data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleansed')
               field: host_id

     - name: room_type
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']


  - name: dim_listings_w_hosts
    data_tests:
     - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('airbnb','listings') 
    columns:
      - name: price
        tests:
         - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: .95
                min_value: 50
                max_value: 500
         - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: number
         - dbt_expectations.expect_column_max_to_be_between:
             arguments:
                min_value: 2555 
                max_value: 8000
                strictly: true
                config:
                  severity: warn 

                        
  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true
    columns: 
     - name: host_id
       data_type: integer
       tests:
       - not_null
       - unique

     - name: host_name
       data_type: string

       tests: 
       - not_null
     - name: is_superhost 
       data_type: string

       tests:
       - accepted_values:
          arguments:
            values: ['t','f']
     - name: updated_at
       data_type: timestamp
     - name: created_at
       data_type: timestamp  
  - name: fct_reviews
    columns: 
    - name: listing_id
      tests: 
      - not_null
      - relationships:
          arguments:
            to: ref('dim_listings_cleansed')
            field: listing_id 
    - name: review_text
      tests:
      - not_null
    - name: reviewer_name
      tests:
      - not_null
    - name: REVIEW_SENTIMENT
      tests: 
      - accepted_values:
          arguments:
            values: ['positive','neutral','negative']



  